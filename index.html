<!DOCTYPE html>
<html>
<head>
  <title>Nutrient Deficiency Detector</title>
</head>
<body>

  <h2>Nutrient Deficiency Detection</h2>

  <input type="text" id="inputText" placeholder="Enter symptoms" style="width:300px;">
  <button onclick="predict()">Predict</button>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    async function predict() {
      const userInput = document.getElementById("inputText").value;

      try {
        const res = await fetch("https://nutrient-backend.onrender.com/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text: userInput })
        });

        const data = await res.json();

        let output = "";
        for (let key in data) {
          output += key + " : " + data[key] + "<br>";
        }

        document.getElementById("result").innerHTML = output;

      } catch (error) {
        document.getElementById("result").innerHTML = "Error connecting to backend";
      }
    }
  </script>

</body>
</html>
